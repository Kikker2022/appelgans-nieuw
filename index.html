<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Appelgans</title>

<style>

body {
font-family: Arial;
text-align: center;
}

#bord {
display: grid;
grid-template-columns: repeat(7, 70px);
gap: 5px;
justify-content: center;
margin-top: 20px;
}

.vak {
width: 70px;
height: 70px;
border: 1px solid black;
display: flex;
align-items: center;
justify-content: center;
font-size: 18px;
}

button {
font-size: 18px;
padding: 10px 20px;
margin: 10px;
}

</style>

</head>

<body>

<h1>🪿 Appelgans TEST 123</h1>

<h3 id="beurt">Team 1 is aan de beurt</h3>

<button id="dobbel">🎲 Gooi dobbelsteen</button>

<p id="worp"></p>

<p id="melding"></p>

<h3>Score</h3>

<p>Team 1: <span id="score1">1</span></p>
<p>Team 2: <span id="score2">1</span></p>

<div id="bord"></div>

<script src="app.js"></script>

</body>
</html>
