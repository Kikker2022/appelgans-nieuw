<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Appelgans</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🪿 Appelgans</h1>

<div id="game">

  <div id="board"></div>

  <div id="controls">
    <p id="turn">Team 1 is aan de beurt</p>
    <button onclick="rollDice()">🎲 Gooi dobbelsteen</button>
    <p id="diceResult"></p>
  </div>

  <div id="questionBox">
    <p id="question">Vraag verschijnt hier...</p>
    <button onclick="showAnswer()">Toon antwoord</button>
    <p id="answer"></p>
  </div>

</div>

<script src="data/vragen.js"></script>
<script src="app.js"></script>

</body>
</html>
